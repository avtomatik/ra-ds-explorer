<!DOCTYPE html>
<html>

<head>
  <title>Expiring Certificates</title>
</head>

<body>

  <h1>Expiring Certificates ({{ report.name }})</h1>
  <p>Generated at: {{ report.generated_at }}</p>

  <table border="1">
    <tr>
      <th>Serial</th>
      <th>Issuer</th>
      <th>Expiry</th>
    </tr>

    {% for c in report.data %}
    <tr>
      <td>{{ c.serial_number }}</td>
      <td>{{ c.name_attributes.common_name }}</td>
      <td>{{ c.not_after }}</td>
    </tr>
    {% endfor %}
  </table>

</body>

</html>
